<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本47都道府県 旅行キーワード v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1209;
    --paper: #f5f0e8;
    --red: #c0392b;
    --muted: #8b7355;
    --light: #e8e0d0;
    --region-tohoku: #4a7c59;
    --region-kanto: #2c5f8a;
    --region-chubu: #7b4f2e;
    --region-kinki: #6b3a7d;
    --region-chugoku: #2e7a6b;
    --region-shikoku: #8a6b2c;
    --region-kyushu: #8a2c2c;
    --region-hokkaido: #2c4a8a;
    --region-okinawa: #2c8a7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }

  header {
    background: var(--ink);
    color: var(--paper);
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.02) 10px, rgba(255,255,255,0.02) 20px);
  }
  header h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 900;
    letter-spacing: 0.08em;
    position: relative;
  }
  header h1 span { color: var(--red); }
  header p {
    margin-top: 0.5rem;
    font-size: 0.85rem;
    color: #aaa;
    letter-spacing: 0.1em;
    position: relative;
  }

  .search-bar {
    display: flex;
    justify-content: center;
    padding: 1.2rem 1rem;
    background: var(--light);
    border-bottom: 1px solid #d4c9b0;
  }
  .search-bar input {
    width: 100%;
    max-width: 400px;
    padding: 0.6rem 1rem;
    border: 1.5px solid #c4b89a;
    border-radius: 0;
    background: white;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--red); }

  .region-nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.4rem;
    padding: 0.8rem 1rem;
    background: white;
    border-bottom: 1px solid var(--light);
  }
  .region-btn {
    padding: 0.3rem 0.7rem;
    border: 1.5px solid currentColor;
    border-radius: 0;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    background: white;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .region-btn:hover, .region-btn.active { color: white; background: currentColor; }
  .region-btn[data-region="all"] { color: var(--ink); border-color: var(--ink); }
  .region-btn[data-region="北海道"] { color: var(--region-hokkaido); }
  .region-btn[data-region="東北"] { color: var(--region-tohoku); }
  .region-btn[data-region="関東"] { color: var(--region-kanto); }
  .region-btn[data-region="中部"] { color: var(--region-chubu); }
  .region-btn[data-region="近畿"] { color: var(--region-kinki); }
  .region-btn[data-region="中国"] { color: var(--region-chugoku); }
  .region-btn[data-region="四国"] { color: var(--region-shikoku); }
  .region-btn[data-region="九州"] { color: var(--region-kyushu); }
  .region-btn[data-region="沖縄"] { color: var(--region-okinawa); }

  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
  }

  .region-section { margin-bottom: 2rem; }

  .region-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 0.4rem 0.8rem;
    margin-bottom: 0.8rem;
    color: white;
    display: inline-block;
  }

  .prefectures-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0.8rem;
  }

  .prefecture-card {
    background: white;
    border: 1px solid var(--light);
    padding: 0.9rem 1rem;
    transition: all 0.2s;
    position: relative;
    overflow: visible;
  }
  .prefecture-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent-color, var(--ink));
  }
  .prefecture-card:hover {
    box-shadow: 4px 4px 0 rgba(0,0,0,0.08);
    transform: translate(-1px, -1px);
  }

  .pref-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }
  .pref-name {
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent-color, var(--ink));
  }
  .pref-link {
    font-size: 0.68rem;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--light);
    padding: 0.15rem 0.4rem;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .pref-link:hover {
    background: var(--accent-color, var(--ink));
    color: white;
    border-color: transparent;
  }

  .keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }

  /* キーワードタグ */
  .keyword {
    position: relative;
    font-size: 0.75rem;
    background: var(--paper);
    padding: 0.25rem 0.55rem;
    border: 1px solid var(--light);
    color: var(--muted);
    cursor: default;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    user-select: none;
  }
  .keyword:hover {
    border-color: var(--accent-color, var(--ink));
    color: var(--ink);
    background: white;
    z-index: 10;
  }

  /* ホバーメニュー */
  .kw-actions {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    display: flex;
    gap: 2px;
    background: var(--ink);
    padding: 4px 5px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s;
    z-index: 200;
    white-space: nowrap;
  }
  .kw-actions::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--ink);
  }
  .keyword:hover .kw-actions {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }

  .kw-action-btn {
    display: flex;
    align-items: center;
    gap: 3px;
    padding: 3px 7px;
    font-size: 0.65rem;
    color: #bbb;
    text-decoration: none;
    transition: background 0.1s, color 0.1s;
    font-family: 'Noto Sans JP', sans-serif;
    white-space: nowrap;
    border-radius: 1px;
  }
  .kw-action-btn:hover { background: rgba(255,255,255,0.12); color: white; }
  .kw-action-btn svg {
    width: 10px; height: 10px;
    fill: currentColor;
    flex-shrink: 0;
  }

  .kw-sep {
    width: 1px;
    background: rgba(255,255,255,0.12);
    margin: 2px 0;
  }

  .hidden { display: none !important; }

  footer {
    text-align: center;
    padding: 1.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--light);
  }
</style>
</head>

    { name:"長崎", keywords:["ハウステンボス","グラバー園","長崎ちゃんぽん","皿うどん","眼鏡橋","出島","九十九島","カステラ"] },
    { name:"熊本", keywords:["熊本城","阿蘇山","くまモン","馬刺し","辛子蓮根","天草","通潤橋","太平燕"] },

const svgMap    = `<svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>`;

let currentRegion = "all";

function buildUI() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  for (const [region, info] of Object.entries(data)) {
    const section = document.createElement('div');
    section.className = 'region-section';
    section.dataset.region = region;

    const title = document.createElement('div');
    title.className = 'region-title';
    title.textContent = region;
    title.style.background = info.color;
    section.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'prefectures-grid';

    for (const pref of info.prefs) {
      const card = document.createElement('div');
      card.className = 'prefecture-card';
      card.style.setProperty('--accent-color', info.color);
      card.dataset.name = pref.name;
      card.dataset.keywords = pref.keywords.join(' ');
      card.dataset.region = region;

      const tourismUrl = tourismLinks[pref.name] || '#';

      const header = document.createElement('div');
      header.className = 'pref-header';
      header.innerHTML = `
        <div class="pref-name">${pref.name}</div>
        <a class="pref-link" href="${tourismUrl}" target="_blank" rel="noopener">公式観光サイト ↗</a>
      `;

      const kwContainer = document.createElement('div');
      kwContainer.className = 'keywords';

      for (const kw of pref.keywords) {
        const mapsUrl   = `https://www.google.com/maps/search/${encodeURIComponent(kw + ' ' + pref.name)}`;
        const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(kw + ' ' + pref.name)}`;
        const tag       = kw.replace(/[・（）()　\s]/g, '');
        const instaUrl  = `https://www.instagram.com/explore/tags/${encodeURIComponent(tag)}`;

        const kwEl = document.createElement('span');
        kwEl.className = 'keyword';
        kwEl.innerHTML = `${kw}<span class="kw-actions">
          <a class="kw-action-btn" href="${mapsUrl}" target="_blank" rel="noopener">${svgMap}Maps</a>
          <span class="kw-sep"></span>
          <a class="kw-action-btn" href="${searchUrl}" target="_blank" rel="noopener">${svgSearch}検索</a>
          <span class="kw-sep"></span>
          <a class="kw-action-btn" href="${instaUrl}" target="_blank" rel="noopener">${svgInsta}Instagram</a>
        </span>`;
        kwContainer.appendChild(kwEl);
      }

      card.appendChild(header);
      card.appendChild(kwContainer);
      grid.appendChild(card);
    }

    section.appendChild(grid);
    main.appendChild(section);
  }
}

function filterCards() {
  const query = document.getElementById('search').value.trim().toLowerCase();
  document.querySelectorAll('.prefecture-card').forEach(card => {
    const nameMatch   = card.dataset.name.includes(query);
    const kwMatch     = card.dataset.keywords.includes(query);
    const regionMatch = currentRegion === 'all' || card.dataset.region === currentRegion;
    card.classList.toggle('hidden', !(nameMatch || kwMatch) || !regionMatch);
  });
  document.querySelectorAll('.region-section').forEach(section => {
    const visible = [...section.querySelectorAll('.prefecture-card')].some(c => !c.classList.contains('hidden'));
    section.classList.toggle('hidden', !visible);
  });
}

function filterRegion(region, btn) {
  currentRegion = region;
  document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

buildUI();
</script>
