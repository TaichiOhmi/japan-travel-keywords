<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本47都道府県 旅行キーワード v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1209;
    --paper: #f5f0e8;
    --red: #c0392b;
    --gold: #b8860b;
    --muted: #8b7355;
    --light: #e8e0d0;
    --region-tohoku: #4a7c59;
    --region-kanto: #2c5f8a;
    --region-chubu: #7b4f2e;
    --region-kinki: #6b3a7d;
    --region-chugoku: #2e7a6b;
    --region-shikoku: #8a6b2c;
    --region-kyushu: #8a2c2c;
    --region-hokkaido: #2c4a8a;
    --region-okinawa: #2c8a7a;
    --wishlist-bg: #fff8f0;
    --wishlist-border: #e8c890;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.02) 10px, rgba(255,255,255,0.02) 20px);
  }
  header h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 900;
    letter-spacing: 0.08em;
    position: relative;
  }
  header h1 span { color: var(--red); }
  header p {
    margin-top: 0.5rem;
    font-size: 0.85rem;
    color: #aaa;
    letter-spacing: 0.1em;
    position: relative;
  }

  /* ── SEARCH ── */
  .search-bar {
    display: flex;
    justify-content: center;
    padding: 1.2rem 1rem;
    background: var(--light);
    border-bottom: 1px solid #d4c9b0;
  }
  .search-bar input {
    width: 100%;
    max-width: 400px;
    padding: 0.6rem 1rem;
    border: 1.5px solid #c4b89a;
    border-radius: 0;
    background: white;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--red); }

  /* ── REGION NAV ── */
  .region-nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.4rem;
    padding: 0.8rem 1rem;
    background: white;
    border-bottom: 1px solid var(--light);
  }
  .region-btn {
    padding: 0.3rem 0.7rem;
    border: 1.5px solid currentColor;
    border-radius: 0;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    background: white;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .region-btn:hover, .region-btn.active { color: white; background: currentColor; }
  .region-btn[data-region="all"] { color: var(--ink); border-color: var(--ink); }
  .region-btn[data-region="北海道"] { color: var(--region-hokkaido); }
  .region-btn[data-region="東北"] { color: var(--region-tohoku); }
  .region-btn[data-region="関東"] { color: var(--region-kanto); }
  .region-btn[data-region="中部"] { color: var(--region-chubu); }
  .region-btn[data-region="近畿"] { color: var(--region-kinki); }
  .region-btn[data-region="中国"] { color: var(--region-chugoku); }
  .region-btn[data-region="四国"] { color: var(--region-shikoku); }
  .region-btn[data-region="九州"] { color: var(--region-kyushu); }
  .region-btn[data-region="沖縄"] { color: var(--region-okinawa); }

  /* ── WISHLIST BAR ── */
  .wishlist-bar {
    background: var(--wishlist-bg);
    border-bottom: 2px solid var(--wishlist-border);
    padding: 0.7rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    flex-wrap: wrap;
    min-height: 48px;
    transition: all 0.2s;
  }
  .wishlist-bar.empty {
    display: none;
  }
  .wishlist-label {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.08em;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .wishlist-label svg { width: 14px; height: 14px; fill: var(--gold); }
  .wishlist-items {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    flex: 1;
  }
  .wishlist-item {
    font-size: 0.72rem;
    background: white;
    border: 1px solid var(--wishlist-border);
    padding: 0.2rem 0.5rem;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 0.3rem;
    cursor: default;
  }
  .wishlist-item .remove-btn {
    color: #bbb;
    cursor: pointer;
    font-size: 0.8rem;
    line-height: 1;
    transition: color 0.1s;
    background: none;
    border: none;
    padding: 0;
    font-family: inherit;
  }
  .wishlist-item .remove-btn:hover { color: var(--red); }
  .wishlist-actions {
    display: flex;
    gap: 0.5rem;
    margin-left: auto;
  }
  .wishlist-btn {
    font-size: 0.72rem;
    padding: 0.25rem 0.6rem;
    border: 1.5px solid;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    transition: all 0.15s;
    background: white;
    white-space: nowrap;
  }
  .wishlist-btn.clear-btn {
    border-color: #ccc;
    color: #999;
  }
  .wishlist-btn.clear-btn:hover {
    border-color: var(--red);
    color: var(--red);
  }
  .wishlist-empty-msg {
    font-size: 0.75rem;
    color: #bbb;
    font-style: italic;
  }

  /* ── MAIN ── */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
  }

  .region-section { margin-bottom: 2rem; }

  .region-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 0.4rem 0.8rem;
    margin-bottom: 0.8rem;
    color: white;
    display: inline-block;
  }

  .prefectures-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0.8rem;
  }

  .prefecture-card {
    background: white;
    border: 1px solid var(--light);
    padding: 0.9rem 1rem;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .prefecture-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent-color, var(--ink));
  }
  .prefecture-card:hover {
    box-shadow: 4px 4px 0 rgba(0,0,0,0.08);
    transform: translate(-1px, -1px);
  }

  .pref-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }
  .pref-name {
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent-color, var(--ink));
  }
  .pref-link {
    font-size: 0.68rem;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--light);
    padding: 0.15rem 0.4rem;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .pref-link:hover {
    background: var(--accent-color, var(--ink));
    color: white;
    border-color: transparent;
  }

  .keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }

  /* keyword: left half = Maps, right area = + wishlist */
  .keyword {
    font-size: 0.75rem;
    background: var(--paper);
    padding: 0;
    border: 1px solid var(--light);
    color: var(--muted);
    transition: all 0.15s;
    display: flex;
    align-items: stretch;
    overflow: hidden;
    cursor: default;
  }
  .keyword:hover {
    border-color: var(--accent-color, var(--ink));
  }
  .kw-map {
    padding: 0.2rem 0.45rem;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.2rem;
    color: inherit;
    text-decoration: none;
    font-size: inherit;
    font-family: inherit;
    background: none;
    border: none;
  }
  .kw-map:hover {
    background: var(--accent-color, var(--ink));
    color: white;
  }
  .kw-map svg {
    width: 9px;
    height: 9px;
    flex-shrink: 0;
    opacity: 0.6;
  }
  .kw-divider {
    width: 1px;
    background: var(--light);
    flex-shrink: 0;
  }
  .kw-add {
    padding: 0.2rem 0.35rem;
    cursor: pointer;
    color: #ccc;
    font-size: 0.9rem;
    line-height: 1;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    background: none;
    border: none;
    font-family: inherit;
  }
  .kw-add:hover { color: var(--gold); background: #fff8e8; }
  .kw-add.added { color: var(--gold); }

  .hidden { display: none !important; }

  footer {
    text-align: center;
    padding: 1.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--light);
  }

</style>
</head>

<div class="main" id="main"></div>

      { name: "宮崎", keywords: ["高千穂峡", "青島神社", "日南海岸", "地鶏炭火焼き", "チキン南蛮", "マンゴー", "日向夏", "鵜戸神宮"] },

    ]
  }

// ── STATE ──
let currentRegion = "all";
let wishlist = []; // [{keyword, pref}]

// ── MAP PIN SVG ──
const mapPinSVG = `<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>`;

// ── BUILD UI ──
function buildUI() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  for (const [region, info] of Object.entries(data)) {
    const section = document.createElement('div');
    section.className = 'region-section';
    section.dataset.region = region;

    const title = document.createElement('div');
    title.className = 'region-title';
    title.textContent = region;
    title.style.background = info.color;
    section.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'prefectures-grid';

    for (const pref of info.prefs) {
      const card = document.createElement('div');
      card.className = 'prefecture-card';
      card.style.setProperty('--accent-color', info.color);
      card.dataset.name = pref.name;
      card.dataset.keywords = pref.keywords.join(' ');
      card.dataset.region = region;

      const tourismUrl = tourismLinks[pref.name] || '#';

      const header = document.createElement('div');
      header.className = 'pref-header';
      header.innerHTML = `
        <div class="pref-name">${pref.name}</div>
        <a class="pref-link" href="${tourismUrl}" target="_blank" rel="noopener">公式観光サイト ↗</a>
      `;

      const kwContainer = document.createElement('div');
      kwContainer.className = 'keywords';

      for (const kw of pref.keywords) {
        const mapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(kw + ' ' + pref.name)}`;
        const kwEl = document.createElement('span');
        kwEl.className = 'keyword';
        kwEl.innerHTML = `
          <a class="kw-map" href="${mapsUrl}" target="_blank" rel="noopener" title="Google Mapsで確認">${mapPinSVG}${kw}</a>
          <span class="kw-divider"></span>
          <button class="kw-add" title="気になるリストに追加">＋</button>
        `;
        kwEl.querySelector('.kw-add').addEventListener('click', () => toggleWishlist(kw, pref.name));
        kwContainer.appendChild(kwEl);
      }

      card.appendChild(header);
      card.appendChild(kwContainer);
      grid.appendChild(card);
    }

    section.appendChild(grid);
    main.appendChild(section);
  }

  syncWishlistButtons();
}

// ── WISHLIST ──
function toggleWishlist(kw, pref) {
  const exists = wishlist.findIndex(w => w.keyword === kw && w.pref === pref);
  if (exists >= 0) {
    wishlist.splice(exists, 1);
  } else {
    wishlist.push({ keyword: kw, pref });
  }
  renderWishlist();
  syncWishlistButtons();
}

function renderWishlist() {
  const bar = document.getElementById('wishlistBar');
  const items = document.getElementById('wishlistItems');
  const actions = document.getElementById('wishlistActions');

  if (wishlist.length === 0) {
    bar.classList.add('empty');
    items.innerHTML = '<span class="wishlist-empty-msg">キーワードの ＋ ボタンで追加できます</span>';
    actions.style.display = 'none';
    return;
  }

  bar.classList.remove('empty');
  actions.style.display = 'flex';
  items.innerHTML = wishlist.map((w, i) => `
    <span class="wishlist-item">
      <span style="color:var(--muted);font-size:0.65rem">${w.pref}</span>&nbsp;${w.keyword}
      <button class="remove-btn" data-idx="${i}">×</button>
    </span>
  `).join('');
  items.addEventListener('click', e => {
    const btn = e.target.closest('.remove-btn');
    if (btn) removeWishlist(Number(btn.dataset.idx));
  }, { once: true });
}

function removeWishlist(i) {
  wishlist.splice(i, 1);
  renderWishlist();
  syncWishlistButtons();
}

function clearWishlist() {
  wishlist = [];
  renderWishlist();
  syncWishlistButtons();
}

function syncWishlistButtons() {
  // pref + keyword の組み合わせで判定することで同名キーワード別県バグを防ぐ
  document.querySelectorAll('.kw-add').forEach(btn => {
    const kwText = btn.closest('.keyword')?.querySelector('.kw-map')?.textContent.trim();
    const prefName = btn.closest('.prefecture-card')?.dataset.name;
    const inList = wishlist.some(w => w.keyword === kwText && w.pref === prefName);
    btn.classList.toggle('added', inList);
    btn.textContent = inList ? '✓' : '＋';
  });
}

// ── FILTER ──
function filterCards() {
  const query = document.getElementById('search').value.trim().toLowerCase();
  const cards = document.querySelectorAll('.prefecture-card');
  const sections = document.querySelectorAll('.region-section');

  cards.forEach(card => {
    const nameMatch = card.dataset.name.includes(query);
    const kwMatch = card.dataset.keywords.includes(query);
    const regionMatch = currentRegion === 'all' || card.dataset.region === currentRegion;
    card.classList.toggle('hidden', !(nameMatch || kwMatch) || !regionMatch);
  });

  sections.forEach(section => {
    const visible = [...section.querySelectorAll('.prefecture-card')].some(c => !c.classList.contains('hidden'));
    section.classList.toggle('hidden', !visible);
  });
}

function filterRegion(region, btn) {
  currentRegion = region;
  document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

buildUI();
</script>
