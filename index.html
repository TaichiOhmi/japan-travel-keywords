<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本47都道府県 旅行キーワード</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1209;
    --paper: #f5f0e8;
    --red: #c0392b;
    --gold: #b8860b;
    --muted: #8b7355;
    --light: #e8e0d0;
    --region-tohoku: #4a7c59;
    --region-kanto: #2c5f8a;
    --region-chubu: #7b4f2e;
    --region-kinki: #6b3a7d;
    --region-chugoku: #2e7a6b;
    --region-shikoku: #8a6b2c;
    --region-kyushu: #8a2c2c;
    --region-hokkaido: #2c4a8a;
    --region-okinawa: #2c8a7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--ink);
    color: var(--paper);
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 10px,
      rgba(255,255,255,0.02) 10px,
      rgba(255,255,255,0.02) 20px
    );
  }

  header h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 900;
    letter-spacing: 0.08em;
    position: relative;
  }

  header h1 span {
    color: var(--red);
  }

  header p {
    margin-top: 0.5rem;
    font-size: 0.85rem;
    color: #aaa;
    letter-spacing: 0.1em;
    position: relative;
  }

  .search-bar {
    display: flex;
    justify-content: center;
    padding: 1.2rem 1rem;
    background: var(--light);
    border-bottom: 1px solid #d4c9b0;
    gap: 0.5rem;
  }

  .search-bar input {
    width: 100%;
    max-width: 400px;
    padding: 0.6rem 1rem;
    border: 1.5px solid #c4b89a;
    border-radius: 0;
    background: white;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar input:focus {
    border-color: var(--red);
  }

  .region-nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.4rem;
    padding: 0.8rem 1rem;
    background: white;
    border-bottom: 1px solid var(--light);
  }

  .region-btn {
    padding: 0.3rem 0.7rem;
    border: 1.5px solid currentColor;
    border-radius: 0;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    background: white;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .region-btn:hover, .region-btn.active {
    color: white;
    background: currentColor;
  }

  .region-btn[data-region="all"] { color: var(--ink); border-color: var(--ink); }
  .region-btn[data-region="北海道"] { color: var(--region-hokkaido); }
  .region-btn[data-region="東北"] { color: var(--region-tohoku); }
  .region-btn[data-region="関東"] { color: var(--region-kanto); }
  .region-btn[data-region="中部"] { color: var(--region-chubu); }
  .region-btn[data-region="近畿"] { color: var(--region-kinki); }
  .region-btn[data-region="中国"] { color: var(--region-chugoku); }
  .region-btn[data-region="四国"] { color: var(--region-shikoku); }
  .region-btn[data-region="九州"] { color: var(--region-kyushu); }
  .region-btn[data-region="沖縄"] { color: var(--region-okinawa); }

  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
  }

  .region-section {
    margin-bottom: 2rem;
  }

  .region-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 0.4rem 0.8rem;
    margin-bottom: 0.8rem;
    color: white;
    display: inline-block;
  }

  .prefectures-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0.8rem;
  }

  .prefecture-card {
    background: white;
    border: 1px solid var(--light);
    padding: 0.9rem 1rem;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .prefecture-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--accent-color, var(--ink));
  }

  .prefecture-card:hover {
    box-shadow: 4px 4px 0 rgba(0,0,0,0.08);
    transform: translate(-1px, -1px);
  }

  .pref-name {
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: var(--accent-color, var(--ink));
  }

  .keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }

  .keyword {
    font-size: 0.75rem;
    background: var(--paper);
    padding: 0.2rem 0.5rem;
    border: 1px solid var(--light);
    color: var(--muted);
    transition: all 0.15s;
  }

  .keyword:hover {
    background: var(--accent-color, var(--ink));
    color: white;
    border-color: transparent;
    cursor: default;
  }

  .hidden { display: none !important; }

  .no-results {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  footer {
    text-align: center;
    padding: 1.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--light);
  }
</style>
</head>

<div class="search-bar">
  <input type="text" id="search" placeholder="都道府県名またはキーワードで検索..." oninput="filterCards()">
</div>

<div class="region-nav">
  <button class="region-btn active" data-region="all" onclick="filterRegion('all', this)">すべて</button>
  <button class="region-btn" data-region="北海道" onclick="filterRegion('北海道', this)">北海道</button>
  <button class="region-btn" data-region="東北" onclick="filterRegion('東北', this)">東北</button>
  <button class="region-btn" data-region="関東" onclick="filterRegion('関東', this)">関東</button>
  <button class="region-btn" data-region="中部" onclick="filterRegion('中部', this)">中部</button>
  <button class="region-btn" data-region="近畿" onclick="filterRegion('近畿', this)">近畿</button>

<div class="main" id="main"></div>

<footer>© 2026 日本旅行キーワードガイド</footer>

let currentRegion = "all";

function buildUI() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  for (const [region, info] of Object.entries(data)) {
    const section = document.createElement('div');
    section.className = 'region-section';
    section.dataset.region = region;

    const title = document.createElement('div');
    title.className = 'region-title';
    title.textContent = region;
    title.style.background = info.color;
    section.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'prefectures-grid';

    for (const pref of info.prefs) {
      const card = document.createElement('div');
      card.className = 'prefecture-card';
      card.style.setProperty('--accent-color', info.color);
      card.dataset.name = pref.name;
      card.dataset.keywords = pref.keywords.join(' ');
      card.dataset.region = region;

      card.innerHTML = `
        <div class="pref-name">${pref.name}</div>
        <div class="keywords">${pref.keywords.map(k => `<span class="keyword">${k}</span>`).join('')}</div>
      `;

      grid.appendChild(card);
    }

    section.appendChild(grid);
    main.appendChild(section);
  }
}

function filterCards() {
  const query = document.getElementById('search').value.trim().toLowerCase();
  const cards = document.querySelectorAll('.prefecture-card');
  const sections = document.querySelectorAll('.region-section');

  cards.forEach(card => {
    const nameMatch = card.dataset.name.includes(query);
    const kwMatch = card.dataset.keywords.includes(query);
    const regionMatch = currentRegion === 'all' || card.dataset.region === currentRegion;
    card.classList.toggle('hidden', !(nameMatch || kwMatch) || !regionMatch);
  });

  sections.forEach(section => {
    const visible = [...section.querySelectorAll('.prefecture-card')].some(c => !c.classList.contains('hidden'));
    section.classList.toggle('hidden', !visible);
  });
}

function filterRegion(region, btn) {
  currentRegion = region;
  document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

buildUI();
</script>
</body>
